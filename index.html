<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SillyTavern Novel Card</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181a20;
      --panel2: #20232b;
      --line: #303640;
      --text: #eef1f5;
      --muted: #a4acb8;
      --gold: #d8b35c;
      --violet: #9f72d9;
      --green: #88c58e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 320px minmax(0, 1fr); }
    aside {
      border-right: 1px solid var(--line);
      background: #15171c;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    header { padding: 24px 22px 18px; border-bottom: 1px solid var(--line); }
    .eyebrow { color: var(--gold); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    h1 { margin: 8px 0 8px; font-size: 25px; line-height: 1.2; }
    .subtitle { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; padding: 16px 22px; border-bottom: 1px solid var(--line); }
    .stat { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 11px; min-height: 64px; }
    .stat strong { display: block; font-size: 22px; line-height: 1.1; }
    .stat span { display: block; margin-top: 8px; color: var(--muted); font-size: 12px; }
    .filters { padding: 14px 22px; border-bottom: 1px solid var(--line); display: grid; gap: 8px; }
    input, select {
      width: 100%;
      background: #0f1115;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 11px;
      outline: none;
      font-size: 13px;
    }
    input:focus, select:focus { border-color: var(--violet); }
    .list { overflow: auto; flex: 1; padding: 12px; }
    .list button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 10px;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      font-size: 13px;
    }
    .list button:hover { background: var(--panel); }
    .list button.active { background: var(--panel2); border-color: var(--violet); }
    .list small { display: block; color: var(--muted); margin-top: 4px; font-size: 11px; }
    .pill { border-radius: 999px; background: var(--gold); color: #161616; padding: 2px 8px; font-size: 12px; height: 22px; white-space: nowrap; }
    main { min-width: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: #121419;
    }
    .topbar h2 { margin: 0; font-size: 19px; line-height: 1.3; }
    .topbar p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .status { color: var(--green); font-size: 12px; white-space: nowrap; }
    .content { overflow: auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #0d0f13;
      border-bottom: 1px solid var(--line);
    }
    .body { padding: 13px; display: grid; gap: 10px; flex: 1; }
    .title { font-size: 15px; font-weight: 700; line-height: 1.4; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; color: var(--muted); font-size: 11px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
    .action {
      text-decoration: none;
      text-align: center;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 9px 8px;
      background: #111319;
      font-size: 13px;
    }
    .action.primary { background: var(--violet); border-color: #b58be8; color: #fff; }
    .detail {
      display: none;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .detail.active { display: grid; }
    .detail img { width: 100%; border-radius: 8px; border: 1px solid var(--line); background: #0d0f13; }
    .detail h3 { margin: 0 0 10px; font-size: 22px; }
    .detail p { color: var(--muted); line-height: 1.7; }
    .detail .actions { max-width: 360px; }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); max-height: none; }
      .list { max-height: 260px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .detail { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <header>
        <div class="eyebrow">SillyTavern Card Index</div>
        <h1>小说角色卡汇总</h1>
        <p class="subtitle">只发布成品 PNG、页面 JSON 和公开说明。原文、构建脚本、来源对照和本机路径不会进入仓库。</p>
      </header>
      <section class="stats">
        <div class="stat"><strong id="total">-</strong><span>角色卡</span></div>
        <div class="stat"><strong id="statusCount">-</strong><span>含状态栏</span></div>
      </section>
      <section class="filters">
        <input id="search" placeholder="搜索标题、标签、版本">
        <select id="mode">
          <option value="all">全部</option>
          <option value="status">只看状态栏卡</option>
          <option value="plain">只看普通卡</option>
        </select>
      </section>
      <nav id="sideList" class="list"></nav>
    </aside>
    <main>
      <section class="topbar">
        <div>
          <h2 id="heading">载入中</h2>
          <p id="subheading">正在读取 cards.json</p>
        </div>
        <div id="loadStatus" class="status">loading</div>
      </section>
      <section class="content">
        <div id="detail" class="detail"></div>
        <div id="grid" class="grid"></div>
      </section>
    </main>
  </div>
  <script>
    let catalog = null;
    let cards = [];
    let currentId = null;

    function fmtBytes(n) {
      if (!n) return "未知大小";
      const mb = n / 1024 / 1024;
      return mb.toFixed(mb >= 10 ? 0 : 1) + " MB";
    }
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[ch]));
    }
    function cardBadges(card) {
      const tags = [...(card.tags || [])].slice(0, 4);
      if (card.has_statusbar) tags.unshift("状态栏");
      if (card.has_two_buttons) tags.unshift("双按钮");
      if (card.opening_count) tags.unshift(card.opening_count + "开局");
      return tags.map(t => `<span class="badge">${esc(t)}</span>`).join("");
    }
    function filterCards() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const mode = document.getElementById("mode").value;
      return cards.filter(card => {
        if (mode === "status" && !card.has_statusbar) return false;
        if (mode === "plain" && card.has_statusbar) return false;
        const hay = [card.title, card.project, card.version, ...(card.tags || [])].join(" ").toLowerCase();
        return !q || hay.includes(q);
      });
    }
    function renderSide(list) {
      const side = document.getElementById("sideList");
      side.innerHTML = list.map(card => `
        <button data-id="${esc(card.id)}" class="${card.id === currentId ? "active" : ""}">
          <span>${esc(card.title)}<small>v${esc(card.version)} · ${fmtBytes(card.size_bytes)}</small></span>
          <span class="pill">${card.opening_count || "-"}</span>
        </button>
      `).join("");
      side.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => showDetail(btn.dataset.id));
      });
    }
    function renderGrid(list) {
      const grid = document.getElementById("grid");
      document.getElementById("detail").classList.remove("active");
      grid.style.display = "";
      grid.innerHTML = list.map(card => `
        <article class="card">
          <img class="cover" src="${esc(card.file)}" alt="${esc(card.title)}">
          <div class="body">
            <div class="title">${esc(card.title)}</div>
            <div class="meta">v${esc(card.version)} · ${fmtBytes(card.size_bytes)} · 世界书 ${card.worldbook_entries || 0} 条</div>
            <div class="badges">${cardBadges(card)}</div>
            <div class="actions">
              <a class="action primary" href="${esc(card.file)}" download>下载 PNG</a>
              <a class="action" href="${esc(card.doc)}">说明</a>
            </div>
          </div>
        </article>
      `).join("");
    }
    function showDetail(id) {
      const card = cards.find(c => c.id === id);
      if (!card) return;
      currentId = id;
      renderSide(filterCards());
      const detail = document.getElementById("detail");
      document.getElementById("grid").style.display = "none";
      detail.classList.add("active");
      detail.innerHTML = `
        <img src="${esc(card.file)}" alt="${esc(card.title)}">
        <div>
          <h3>${esc(card.title)}</h3>
          <p>版本 v${esc(card.version)}，${card.opening_count || "未识别"} 个开局/阶段节点，世界书 ${card.worldbook_entries || 0} 条，文件大小 ${fmtBytes(card.size_bytes)}。</p>
          <div class="badges">${cardBadges(card)}</div>
          ${card.notes ? `<p>${esc(card.notes)}</p>` : ""}
          <div class="actions">
            <a class="action primary" href="${esc(card.file)}" download>下载 PNG</a>
            <a class="action" href="${esc(card.doc)}">打开说明</a>
          </div>
        </div>
      `;
    }
    function render() {
      const list = filterCards();
      document.getElementById("heading").textContent = "角色卡目录";
      document.getElementById("subheading").textContent = `当前显示 ${list.length} / ${cards.length} 张卡`;
      renderSide(list);
      if (currentId && list.some(c => c.id === currentId)) {
        showDetail(currentId);
      } else {
        currentId = null;
        renderGrid(list);
      }
    }
    fetch("cards.json")
      .then(r => r.json())
      .then(data => {
        catalog = data;
        cards = data.cards || [];
        document.getElementById("total").textContent = cards.length;
        document.getElementById("statusCount").textContent = cards.filter(c => c.has_statusbar).length;
        document.getElementById("loadStatus").textContent = "ready";
        document.getElementById("search").addEventListener("input", render);
        document.getElementById("mode").addEventListener("change", render);
        render();
      })
      .catch(err => {
        document.getElementById("heading").textContent = "读取失败";
        document.getElementById("subheading").textContent = err.message;
        document.getElementById("loadStatus").textContent = "error";
      });
  </script>
</body>
</html>
